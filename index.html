<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10-Stack: Puzzle Master</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #263238; font-family: 'Segoe UI', sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        /* 上部広告枠 */
        #ad-top { width: 100%; height: 100px; background: #1a1a1a; z-index: 100; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border-bottom: 2px solid #546e7a; }

        /* ゲームエリア */
        #game-outer { flex-grow: 1; position: relative; width: 100%; background: #37474f; overflow: hidden; display: flex; flex-direction: column; }
        
        #header-ui { width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 15px 0; z-index: 10; color: white; flex-shrink: 0; background: rgba(0,0,0,0.3); }
        .ui-box { padding: 8px 15px; border-radius: 12px; font-weight: bold; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); font-size: 18px; color: #81d4fa; }

        .info-panel { display: flex; gap: 20px; align-items: center; }
        .display-slot { text-align: center; }
        .slot-label { font-size: 11px; color: #b0bec5; margin-bottom: 4px; font-weight: bold; }
        .slot-val { font-size: 32px; font-weight: bold; width: 55px; height: 55px; background: rgba(0,0,0,0.4); border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 3px solid #546e7a; transition: 0.2s; }
        #hold-slot { border-color: #ff4081; color: #ff4081; cursor: pointer; box-shadow: 0 0 10px rgba(255, 64, 129, 0.3); }
        #next-val { color: #ffeb3b; border-color: #fbc02d; }

        #stack-container { flex-grow: 1; display: flex; justify-content: center; align-items: flex-end; padding: 15px; gap: 10px; }
        .lane { width: 75px; height: 98%; background: rgba(0,0,0,0.3); border-radius: 12px; display: flex; flex-direction: column-reverse; align-items: center; padding: 6px; gap: 6px; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .block { width: 63px; height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; color: white; animation: drop 0.2s ease-out; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); box-shadow: inset 0 -4px rgba(0,0,0,0.2); }
        
        @keyframes drop { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #menuScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 500; padding: 10px; color: white; }
        #mid-ad-box { width: 300px; height: 250px; background: #000; margin: 15px 0; border-radius: 8px; overflow: hidden; display: none; border: 1px solid #444; }

        .btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 18px; }
        .menu-btn { width: 270px; height: 65px; display: flex; align-items: center; justify-content: center; font-size: 22px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        #retry-btn { background: #ffeb3b; color: #000; box-shadow: 0 6px #fbc02d, 0 0 20px rgba(255, 235, 59, 0.4); font-size: 24px; }
        #retry-btn:active { transform: translateY(3px); box-shadow: 0 3px #fbc02d; }
        #retry-btn:disabled { background: #444; color: #777; box-shadow: none; transform: none; }
        .link-btn { background: #ff4081; color: white; box-shadow: 0 6px #c2185b; font-size: 18px; }

        #inter-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 99999; align-items: center; justify-content: center; }
        .inter-content { width: 320px; height: 350px; background: #fff; position: relative; border-radius: 15px; }
        #close-ad-btn { position: absolute; top: -55px; right: 0; width: 45px; height: 45px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ad-top">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-outer">
        <div id="header-ui">
            <div id="score-display" class="ui-box">SCORE: 0</div>
            <div class="info-panel">
                <div class="display-slot">
                    <div class="slot-label">HOLD</div>
                    <div id="hold-slot" class="slot-val" onclick="swapHold()">-</div>
                </div>
                <div class="display-slot">
                    <div class="slot-label">NEXT</div>
                    <div id="next-val" class="slot-val">?</div>
                </div>
            </div>
        </div>
        
        <div id="stack-container">
            <div class="lane" onclick="dropInLane(0)" id="lane-0"></div>
            <div class="lane" onclick="dropInLane(1)" id="lane-1"></div>
            <div class="lane" onclick="dropInLane(2)" id="lane-2"></div>
            <div class="lane" onclick="dropInLane(3)" id="lane-3"></div>
        </div>

        <div id="menuScreen">
            <h2 id="result-msg" style="color:#ffeb3b; margin: 10px 0; font-size: 36px; text-align: center;">10-Stack</h2>
            <div id="mid-ad-box">
                <ins class="adsbygoogle" style="display:inline-block;width:300px;height:250px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="9050127185"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>
            <div class="btn-group">
                <button id="retry-btn" class="menu-btn" onclick="startNewGame()">スタート！</button>
                <a href="https://saaaachi.github.io/" class="menu-btn link-btn">他のゲームで遊ぶ</a>
            </div>
        </div>
        
        <div id="inter-screen">
            <div class="inter-content">
                <div id="close-ad-btn" onclick="closeInterAd()">5</div>
                <iframe id="ifr-inter" src="about:blank" style="width:100%; height:100%; border:none; border-radius:15px; background:#fff;"></iframe>
            </div>
        </div>
    </div>

    <script>
        let score = 0, gameActive = false, playCount = 0;
        let nextValue = 0, holdValue = null;
        let lanes = [[], [], [], []];
        const colors = ["", "#81d4fa", "#4fc3f7", "#29b6f6", "#03a9f4", "#039be5", "#0288d1", "#0277bd", "#01579b", "#b71c1c"];

        const retryBtn = document.getElementById("retry-btn");
        const menuScreen = document.getElementById("menuScreen");
        const adMid = document.getElementById("mid-ad-box");

        function startNewGame() {
            menuScreen.style.display = "none";
            adMid.style.display = "none";
            score = 0; lanes = [[], [], [], []]; holdValue = null;
            gameActive = true;
            document.getElementById("score-display").innerText = "SCORE: 0";
            document.getElementById("hold-slot").innerText = "-";
            clearLanes();
            generateNext();
        }

        function clearLanes() {
            for(let i=0; i<4; i++) document.getElementById(`lane-${i}`).innerHTML = "";
        }

        // 数字生成：5以上は4回に1回（25%）の確率で出るように調整
        function generateNext() {
            if (Math.random() < 0.75) {
                // 75%の確率で1〜4が出る
                nextValue = Math.floor(Math.random() * 4) + 1;
            } else {
                // 25%の確率で5〜9が出る
                nextValue = Math.floor(Math.random() * 5) + 5;
            }
            document.getElementById("next-val").innerText = nextValue;
        }

        function swapHold() {
            if(!gameActive) return;
            if(holdValue === null) {
                holdValue = nextValue;
                generateNext();
            } else {
                let temp = nextValue;
                nextValue = holdValue;
                holdValue = temp;
            }
            document.getElementById("hold-slot").innerText = holdValue;
            document.getElementById("next-val").innerText = nextValue;
        }

        function dropInLane(laneIdx) {
            if(!gameActive) return;
            const laneData = lanes[laneIdx];
            const currentTotal = laneData.reduce((a, b) => a + b, 0);

            if(currentTotal + nextValue > 10) {
                gameOver("10を超えました！");
                return;
            }

            laneData.push(nextValue);
            const block = document.createElement("div");
            block.className = "block";
            block.innerText = nextValue;
            block.style.backgroundColor = colors[nextValue];
            document.getElementById(`lane-${laneIdx}`).appendChild(block);

            if(laneData.reduce((a, b) => a + b, 0) === 10) {
                setTimeout(() => {
                    score += 10;
                    lanes[laneIdx] = [];
                    document.getElementById(`lane-${laneIdx}`).innerHTML = "";
                    document.getElementById("score-display").innerText = "SCORE: " + score;
                }, 200);
            }
            generateNext();
        }

        function gameOver(msg) {
            gameActive = false; playCount++;
            document.getElementById("result-msg").innerHTML = msg + "<br>SCORE: " + score;
            retryBtn.innerText = "お待ちください...";
            retryBtn.disabled = true;
            adMid.style.display = "flex";
            menuScreen.style.display = "flex";
            setTimeout(() => {
                retryBtn.disabled = false;
                retryBtn.innerText = "もう一度遊ぶ";
            }, 1500);
            if (playCount % 3 === 0) setTimeout(showInterAd, 500);
        }

        function showInterAd() {
            const screen = document.getElementById("inter-screen"), closeBtn = document.getElementById("close-ad-btn"), ifr = document.getElementById('ifr-inter');
            ifr.src = './ad.large.html?v=' + Date.now();
            screen.style.display = "flex";
            let timerVal = 5;
            closeBtn.innerText = timerVal; closeBtn.style.pointerEvents = "none";
            const countdown = setInterval(() => {
                timerVal--;
                if (timerVal > 0) closeBtn.innerText = timerVal;
                else {
                    clearInterval(countdown);
                    closeBtn.innerText = "×";
                    closeBtn.style.pointerEvents = "auto";
                }
            }, 1000);
        }

        function closeInterAd() {
            document.getElementById("inter-screen").style.display = "none";
            document.getElementById('ifr-inter').src = 'about:blank';
        }

        window.onload = () => { menuScreen.style.display = "flex"; };
    </script>
</body>
</html>
